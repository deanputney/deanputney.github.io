# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: Dean Putney
subtitle: ""
description: ""
keywords:
author: Dean Putney
language: en
timezone: "US/Pacific"

# URL
url: https://www.deanputney.com
permalink: :title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

menu:
logo:
  text: Dean Putney

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - google6c1943d62f543c95.html
  - stardatealpha/**

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: true
marked:
  prependRoot: true
  postAsset: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ""

# Home page setting
index_generator:
  path: "blog"
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: "mtime"

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: sunshine

# Deployment
deploy:
  type: git
  repo: git@github.com:deanputney/deanputney.github.io.git
  branch: gh-pages
  message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"
